<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">OneSake deckbuilder banner</title>
  <desc id="desc">A soft neon skull-and-straw-hat inspired banner on a dark misty background.</desc>
  <defs>
    <radialGradient id="mist" cx="50%" cy="46%" r="68%">
      <stop offset="0%" stop-color="#e8fbff" stop-opacity="0.28" />
      <stop offset="35%" stop-color="#46d3d7" stop-opacity="0.12" />
      <stop offset="72%" stop-color="#111a1f" stop-opacity="0.82" />
      <stop offset="100%" stop-color="#080b0f" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="hat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe880" />
      <stop offset="46%" stop-color="#f04c35" />
      <stop offset="100%" stop-color="#fff7a3" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 1 0 0 0.95 0 0 1 0 1 0 0 0 0.72 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="heavyGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="22" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.85 0 0 1 0 0.45 0 0 0 0.65 0" />
    </filter>
  </defs>

  <rect width="1600" height="420" fill="#0b1015" />
  <rect width="1600" height="420" fill="url(#mist)" />
  <g opacity="0.26">
