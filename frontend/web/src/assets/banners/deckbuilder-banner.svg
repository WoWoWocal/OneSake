    <path d="M0 326 C230 282 390 358 600 324 C780 294 1000 292 1200 332 C1388 370 1480 336 1600 310 L1600 420 L0 420 Z" fill="#192229" />
  </g>

  <g transform="translate(800 218)" filter="url(#heavyGlow)" opacity="0.72">
    <circle r="124" fill="#efffff" opacity="0.34" />
    <ellipse rx="220" ry="56" fill="#f9e96d" opacity="0.2" />
