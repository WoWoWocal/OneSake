      <feColorMatrix in="blur" result="glow" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.92 0 0 1 0 0.7 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="0.9"/>
