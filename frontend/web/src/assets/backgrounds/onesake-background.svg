<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="OneSake neon background">
  <defs>
    <radialGradient id="sceneGlow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" stop-color="#f9f2a7" stop-opacity="0.5"/>
      <stop offset="36%" stop-color="#7ec7d8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#10171d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hat" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f3da5c"/>
      <stop offset="48%" stop-color="#d94b35"/>
      <stop offset="100%" stop-color="#924335"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
